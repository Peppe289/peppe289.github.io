<!doctype html>
<html lang="it">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="author" content="Peppe289">
    <meta property="og:title" content="Giuseppe Speranza">
    <meta name="description" content="Biografia e contatti">
    <meta property="og:site_name" content="Peppe289">

    <link rel="icon" type="image/x-icon" href="../assets/logo.ico">
    <link rel="stylesheet" type="text/css" href="../css/index.css">
    <link rel="stylesheet" type="text/css" href="../css/background.config.css">
    <link rel="stylesheet" type="text/css" href="css/style.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <title>Messaggio anonimo</title>

    <body>
        <div class="main">
            <div class="card-content" style="text-align: center;">
                <h1 style="line-height: 150%; font-family: arial, verdana, tahona, sans-serif; color: white;">
                    Inviami un messaggio anonimo!
                </h1>
            </div>
            <div class="card-content shadow" style="font-size: 16px">
                <div style="padding: 20px 20px 20px 20px;">
                    <p>
                        Il messaggio inviato lo riceverò su telegram in un canale privato accessibile solo a me.
                    </p>
                    <input type="text" id="fname" name="fname" placeholder="Mittente (opzionale)"><br>
                    <input type="text" style="margin-top: 10px;" id="msg" name="msg" placeholder="Messaggio">
                    <input type="button" id="add_button" style="border-radius: 10%;" value="Submit">
                    <div id="response"></div>
                </div>
            </div>
            <div class="firma card-content shadow" style="margin-top: 40px;">
                <p style="font-size: 20px; padding-left: 20px; padding-top: 10px;">
                    Sviluppato da Peppe289
                </p> 
                <div style="padding-left: 10%;">
                    <a href="../index.html" style="text-decoration: none;">
                        <img src="../assets/personal.ico.jpg" class="img-resource"
                        style="border-radius: 100%; height: 30px; width: 30px;">
                    </a> 
                    <a href="https://www.instagram.com/gsperanza204/" style="text-decoration: none;">
                        <img class="img-resource"
                        src="https://www.instagram.com/static/images/ico/apple-touch-icon-180x180-precomposed.png/c06fdb2357bd.png"
                        style="border-radius: 20%; height: 30px; width: 30px;">
                    </a> 
                    <a href="https://t.me/Peppe289" style="text-decoration: none;">
                        <img class="img-resource" src="https://web.telegram.org/z/apple-touch-icon.png"
                        style="border-radius: 100%; height: 30px; width: 30px;">
                    </a>
                    <a href="https://github.com/Peppe289" style="text-decoration: none;">
                        <img class="img-resource" src="https://github.com/fluidicon.png"
                        style="border-radius: 100%; height: 30px; width: 30px;">
                    </a>
                    <a href="https://twitter.com/Peppe2892" style="text-decoration: none;">
                        <img class="img-resource" src="https://abs.twimg.com/responsive-web/client-web/icon-ios.b1fc7275.png"
                        style="border-radius: 100%; height: 30px; width: 30px;">
                    </a>
                    <a href="https://www.reddit.com/user/Peppe289" style="text-decoration: none;">
                        <img class="img-resource" src="https://www.redditstatic.com/desktop2x/img/favicon/apple-icon-120x120.png"
                        style="border-radius: 100%; height: 30px; width: 30px;">
                    </a>
                </div>
            </div>
        </div>
    </body>
    <script>
        const token = '1563558743:AAHDwVSiAU1w5XFE5OHm3meUJYmizJGu8m0';
        const chatId = '-1001441002138';

        $(document).ready(function () {
            $("#add_button").on('click', function (event) {
                execute();
            });

            function execute() {
                const fname = document.querySelector('#fname').value;
                const msg = document.querySelector('#msg').value;
                const isBrowser = navigator.userAgent.toLowerCase();
                const message = `Mittente: ${fname}\nMessaggio: ${msg}\n\nFrom:\n${isBrowser}`;

                $.ajax({
                    type: 'POST',
                    url: `https://api.telegram.org/bot${token}/sendMessage`,
                    data: {
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'html',
                    },
                    success: function (res) {
                        console.debug(res);
                        $('#response').text('Messaggio inviato!');
                    },
                    error: function (error) {
                        console.error(error);
                        $('#response').text('Messaggio non inviato!');
                    }
                });
            }
        });
    </script>
</html>
